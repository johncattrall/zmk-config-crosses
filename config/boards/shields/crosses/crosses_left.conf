# Conditional trackball configuration
CONFIG_SPI=y

# Enable trackball support if any trackball configuration is selected
CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y

# PMW3610 trackball driver configuration
CONFIG_PMW3610=y
CONFIG_PMW3610_INIT_POWER_UP_EXTRA_DELAY_MS=1000
CONFIG_PMW3610_REPORT_INTERVAL_MIN=4
CONFIG_PMW3610_RUN_DOWNSHIFT_TIME_MS=1000
CONFIG_PMW3610_REST1_DOWNSHIFT_TIME_MS=10000
CONFIG_PMW3610_SMART_ALGORITHM=n
CONFIG_ZMK_BLE_MOUSE_REPORT_QUEUE_SIZE=1

# Bluetooth power and compatibility settings
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_BT_CTLR_PHY_2M=n

# Logging configuration
CONFIG_ZMK_USB_LOGGING=n
# CONFIG_PMW3610_LOG_LEVEL_DBG=y

# Split keyboard configuration for left peripheral
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
